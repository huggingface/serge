replicas: 1

nodeSelector:
  role-hub-utils: "true"

tolerations:
  - key: "huggingface.co/hub-utils"
    operator: "Equal"
    value: "true"
    effect: "NoSchedule"

ingress:
  enabled: true
  path: "/"
  annotations:
    kubernetes.io/ingress.class: "alb"
    # Internet-facing: serge is reached at https://serge.hf.co and gates
    # access with its own GitHub OAuth. The LB controller discovers the
    # ACM cert that matches this host (created in infra 11-eks-misc), so
    # no certificate-arn is hard-coded here.
    alb.ingress.kubernetes.io/scheme: "internet-facing"
    alb.ingress.kubernetes.io/target-type: "ip"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: "/healthz"
    alb.ingress.kubernetes.io/load-balancer-name: "serge-prod"
    alb.ingress.kubernetes.io/group.name: "serge-prod"
    alb.ingress.kubernetes.io/tags: "Env=prod,Project=serge,Terraform=true"
    # external-dns creates the serge.hf.co record pointing at this ALB
    # (the domain is allow-listed in infra 05-eks-utils).
    external-dns.alpha.kubernetes.io/hostname: "serge.hf.co"

# Non-secret runtime config. Secrets (DATABASE_URL, GitHub App key, OAuth
# client secret, session secret, LLM key) come from Infisical -> serge-secs.
envVars:
  PORT: "8080"
  LOG_LEVEL: "INFO"
  LLM_API_BASE: "https://router.huggingface.co/v1"
  LLM_MODEL: "moonshotai/Kimi-K2.6"
  LLM_STREAM: "1"
  MENTION_TRIGGER: "@askserge"
  REVIEW_EVENT: "COMMENT"
  # Refuse to run PR-author subprocesses unless bubblewrap is available.
  # Requires the pod to allow unprivileged user namespaces (see PR notes).
  HELPER_SANDBOX: "require"
  DEV_NO_AUTH: "0"
  WEB_ALLOWED_ORG: "huggingface"
  GITHUB_OAUTH_CALLBACK_URL: "https://serge.hf.co/auth/callback"
  WEB_GITHUB_APP_URL: "https://github.com/apps/sergereview"

infisical:
  enabled: true
  env: "prod-us-east-1"
  # TODO: set to the serge Infisical project slug once the project exists
  # (mirrors deepsite's "deepsite-f-hvj"). The /serge folder must hold
  # DATABASE_URL + the GitHub App / OAuth / session / LLM secrets, and the
  # operator machine-identity creds (OPERATOR_CLIENT_ID / _SECRET).
  project: ""
  resyncInterval: 60
  operatorSecretName: "serge-operator-secrets"
  operatorSecretNamespace: "hub-utils"

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 1
    memory: 1Gi
