image:
  repository: ghcr.io/huggingface
  name: serge
  tag: latest
  pullPolicy: IfNotPresent

# SQLite is a single-writer store and the embedded DB lives on one RWO
# volume, so keep this at 1 (the Deployment also uses the Recreate strategy).
replicas: 1

# uvicorn listens here (reviewbot-web defaults to 8080).
containerPort: 8080

# Persistent volume for the embedded SQLite job store (review/task metadata,
# drafts, provider configs). The DB file lives here so history survives pod
# restarts. WEB_STORE_PATH is set to <mountPath>/jobs.db by the deployment.
persistence:
  enabled: true
  storageClass: ""        # "" = cluster default StorageClass
  accessMode: ReadWriteOnce
  size: 5Gi
  mountPath: /var/lib/reviewbot

service:
  type: ClusterIP
  port: 80
  annotations: {}

serviceAccount:
  create: false
  name: ""
  annotations: {}

# Disabled by default — enable and set host/className/annotations for your
# cluster's ingress controller (nginx, ALB, ...).
ingress:
  enabled: false
  className: ""
  host: ""
  path: /
  pathType: Prefix
  annotations: {}
  tls: []

# Pod/container hardening. fsGroup lets the non-root app user (uid 1000 in
# the image) write to the persistent volume. If your cluster forbids the
# unprivileged user namespaces bubblewrap needs, either relax this or set
# HELPER_SANDBOX=auto/off in envVars.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: RuntimeDefault

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

nodeSelector: {}
tolerations: []
affinity: {}

# Non-secret runtime config, rendered into a ConfigMap and injected via
# envFrom. WEB_STORE_PATH is injected separately from persistence.mountPath.
envVars:
  PORT: "8080"
  LOG_LEVEL: "INFO"

# Name of a pre-created Secret holding the sensitive env (GITHUB_APP_ID,
# GITHUB_PRIVATE_KEY, GITHUB_WEBHOOK_SECRET, GITHUB_OAUTH_CLIENT_ID,
# GITHUB_OAUTH_CLIENT_SECRET, WEB_SESSION_SECRET, LLM_API_KEY, ...). Injected
# via envFrom. Leave empty to manage everything through envVars/extraEnv.
existingSecret: ""

extraEnv: []
extraEnvFrom: []
