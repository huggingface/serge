<header class="site-header" role="banner">
  <div class="wrapper site-header-inner">
    <a class="site-title site-title-with-icon" rel="author" href="{{ "/" | relative_url }}">
      <img class="site-title-icon" src="{{ "/assets/serge-logo.png" | relative_url }}" alt="" width="28" height="28">
      <span>{{ site.title | escape }}</span>
    </a>

    <nav class="site-nav" aria-label="Main navigation">
      <div class="trigger">
        {%- for path in site.header_pages -%}
          {%- assign page = site.pages | where: "path", path | first -%}
          {%- if page.title -%}
            <a class="page-link" href="{{ page.url | relative_url }}">{{ page.nav_title | default: page.title | escape }}</a>
          {%- endif -%}
        {%- endfor -%}

        <a class="repo-link" href="{{ site.repository_url }}" rel="noopener" target="_blank" aria-label="View ai-reviewer on GitHub">
          <svg class="repo-link-icon" viewBox="0 0 16 16" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82A7.62 7.62 0 0 1 8 3.87c.68 0 1.36.09 2 .26 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/>
          </svg>
          <span>GitHub</span>
          <span class="repo-stars" data-stars-url="{{ site.repository_api_url }}" aria-label="GitHub stars"></span>
        </a>
      </div>
    </nav>
  </div>
  <script src="{{ "/assets/js/github-stars.js" | relative_url }}" defer></script>
</header>
