<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Serge · task</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="/static/serge-logo.png">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="bar">
    <div class="brand-row">
      <a href="/" class="brand"><h1><img class="brand-logo" src="/static/serge-logo.png" alt=""> Serge</h1></a>
    </div>
    <div class="right">
      <span id="target"></span>
      <span class="status-badge" id="status">running</span>
      <a href="/admin/pods" class="secondary nav-link">Pods</a>
      <a href="/journal" class="secondary nav-link">Journal</a>
      <form method="post" action="/auth/logout" style="margin:0">
        <button type="submit" class="secondary">Sign out</button>
      </form>
    </div>
  </header>
  <main>
    <div id="error-banner"></div>

    <section class="card">
      <h2 style="margin-top:0;">Task</h2>
      <p class="hint" id="instruction"></p>
      <div id="result" style="display:none;"></div>
    </section>

    <section class="card">
      <details id="stream-details" open>
        <summary><h2 style="display: inline-block; margin: 0;">Live stream</h2></summary>
        <pre class="console" id="console"></pre>
      </details>
    </section>
  </main>
  <script>
  (function () {
    const m = window.location.pathname.match(/^\/tasks\/([^/]+)\/([^/]+)\/([^/]+)/);
    if (!m) return;
    const [, owner, repo, jobId] = m;
    const apiBase = `/tasks/${owner}/${repo}/${jobId}`;
    const consoleEl = document.getElementById("console");
    const statusEl = document.getElementById("status");
    const targetEl = document.getElementById("target");
    targetEl.textContent = `${owner}/${repo}`;

    function append(line) {
      consoleEl.textContent += line + "\n";
      consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    async function loadInfo() {
      try {
        const r = await fetch(`${apiBase}/info`);
        if (!r.ok) return;
        const info = await r.json();
        statusEl.textContent = info.status;
        document.getElementById("instruction").textContent = info.instruction || "";
        if (info.error) {
          const b = document.getElementById("error-banner");
          b.textContent = info.error;
          b.className = "error";
          b.style.whiteSpace = "pre-wrap";
        }
        if (info.result) {
          const res = info.result;
          const el = document.getElementById("result");
          el.style.display = "block";
          let html = `<p>${res.message || ""}</p>`;
          if (res.url) html += `<p><a href="${res.url}" target="_blank" rel="noopener">${res.url}</a></p>`;
          if (res.changed_files && res.changed_files.length) {
            html += "<p><strong>Changed files</strong></p><ul>" +
              res.changed_files.map(f => `<li><code>${f}</code></li>`).join("") + "</ul>";
          }
          el.innerHTML = html;
        }
      } catch (e) { /* ignore */ }
    }

    const es = new EventSource(`${apiBase}/stream`);
    es.onmessage = (e) => { try { append(JSON.parse(e.data)); } catch { append(e.data); } };
    // A `chat` event is a JSON payload of what the model emitted that turn
    // (reviewer._emit_chat_message); render it human-readably.
    function fmtAssistantContent(content) {
      if (!content) return "";
      let o;
      try { o = JSON.parse(content); } catch (_) { return content; }
      if (!o || typeof o !== "object") return content;
      // Task patch answer: {title, body, patch}.
      if ("patch" in o || "title" in o) {
        const out = [];
        if (o.title) out.push(`📝 ${o.title}`);
        if (o.body) out.push(String(o.body));
        const patch = String(o.patch || "").trim();
        out.push(patch ? `⟶ patch: ${patch.split("\n").length} lines`
                        : "⟶ no patch (no change proposed)");
        return "\n   " + out.join("\n   ");
      }
      // Review answer: {summary, event, comments}.
      if ("summary" in o || "comments" in o) {
        const n = Array.isArray(o.comments) ? o.comments.length : 0;
        const ev = o.event ? ` [${o.event}]` : "";
        return `\n   ${o.summary || ""}${ev}\n   ⟶ ${n} inline comment${n === 1 ? "" : "s"}`;
      }
      return content;
    }
    function fmtMessage(txt) {
      let m;
      try { m = JSON.parse(txt); } catch (_) { return txt; }
      if (!m || typeof m !== "object") return txt;
      if (m.role === "tool") {
        // Don't dump the (often large) tool output into the console; just
        // note the tool and a size hint. Full result is in stored history.
        const c = String(m.content || "");
        const lines = c ? c.split("\n").length : 0;
        const size = lines ? ` (${lines} line${lines === 1 ? "" : "s"})` : "";
        return `tool ⟵ ${m.name || "?"}${size}`;
      }
      const meta = [];
      if (m.finish_reason != null && m.finish_reason !== "stop") meta.push(`finish=${m.finish_reason}`);
      if (m.reasoning_chars) meta.push(`reasoning=${m.reasoning_chars}c`);
      const metaStr = meta.length ? ` [${meta.join(", ")}]` : "";
      const calls = Array.isArray(m.tool_calls) && m.tool_calls.length
        ? " → " + m.tool_calls.map(t => `${t.name}(${String(t.arguments || "").slice(0, 80)})`).join(", ")
        : "";
      const body = fmtAssistantContent(m.content);
      if (!body && !calls) return `assistant: (thinking…)${metaStr}`;
      return `assistant:${body ? " " + body : ""}${calls}${metaStr}`;
    }
    ["step", "tool", "error", "log", "chat"].forEach(kind => {
      es.addEventListener(kind, (e) => {
        // The browser also fires a native "error" event (no .data) on a
        // dropped connection; ignore those here — es.onerror handles them.
        if (e.data == null) return;
        let txt;
        try { txt = JSON.parse(e.data); } catch { txt = e.data; }
        if (kind === "error") {
          // Surface the full server-side error (incl. multi-line hints) in
          // a prominent banner as well as the console.
          const b = document.getElementById("error-banner");
          b.textContent = txt;
          b.className = "error";
          b.style.whiteSpace = "pre-wrap";
        }
        if (kind === "chat") { append(`💬 ${fmtMessage(txt)}`); return; }
        append(kind === "log" ? txt : `[${kind}] ${txt}`);
      });
    });
    es.addEventListener("done", () => { es.close(); loadInfo(); });
    es.onerror = () => { /* reconnect handled by browser; refresh info */ loadInfo(); };

    loadInfo();
  })();
  </script>
</body>
</html>
