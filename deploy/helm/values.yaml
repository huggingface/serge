image:
  repository: ghcr.io/huggingface
  name: serge
  tag: latest
  pullPolicy: IfNotPresent

# SQLite is a single-writer store and the embedded DB lives on one RWO
# volume, so keep this at 1 (the Deployment also uses the Recreate strategy).
replicas: 1

# uvicorn listens here (reviewbot-web defaults to 8080).
containerPort: 8080

# Persistent volume for the embedded SQLite job store (review/task metadata,
# drafts, provider configs). The DB file lives here so history survives pod
# restarts. WEB_STORE_PATH is set to <mountPath>/jobs.db by the deployment.
persistence:
  enabled: true
  storageClass: ""        # "" = cluster default StorageClass
  accessMode: ReadWriteOnce
  size: 5Gi
  mountPath: /var/lib/reviewbot

service:
  type: ClusterIP
  port: 80
  annotations: {}

serviceAccount:
  create: false
  name: ""
  annotations: {}

# Disabled by default — enable and set host/className/annotations for your
# cluster's ingress controller (nginx, ALB, ...).
ingress:
  enabled: false
  className: ""
  host: ""
  path: /
  pathType: Prefix
  annotations: {}
  tls: []

# Pod/container hardening. fsGroup lets the non-root app user (uid 1000 in
# the image) write to the persistent volume. If your cluster forbids the
# unprivileged user namespaces bubblewrap needs, either relax this or set
# HELPER_SANDBOX=auto/off in envVars.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: RuntimeDefault

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

nodeSelector: {}
tolerations: []
affinity: {}

# Non-secret runtime config, rendered into a ConfigMap and injected via
# envFrom. WEB_STORE_PATH is injected separately from persistence.mountPath.
envVars:
  PORT: "8080"
  LOG_LEVEL: "INFO"

# Name of a pre-created Secret holding the sensitive env (GITHUB_APP_ID,
# GITHUB_PRIVATE_KEY, GITHUB_WEBHOOK_SECRET, GITHUB_OAUTH_CLIENT_ID,
# GITHUB_OAUTH_CLIENT_SECRET, WEB_SESSION_SECRET, LLM_API_KEY, ...). Injected
# via envFrom. Leave empty to manage everything through envVars/extraEnv.
existingSecret: ""

extraEnv: []
extraEnvFrom: []

# In-loop normalize gate (TASK_SANDBOX_BACKEND=kubernetes): run each task's
# normalizer in a one-shot, locked-down Kubernetes Job. When enabled, the chart
# creates the RBAC (serge's SA may manage Jobs/pods/logs), a shared RWX worktree
# PVC, and a deny-all-egress NetworkPolicy for the Job pods, and wires the TASK_*
# env. Leave disabled for docker/bwrap deployments — Kubernetes is never
# mandatory. Requires serviceAccount.create=true (the RoleBinding targets it).
normalize:
  kubernetes:
    enabled: false
    # Image with the repo toolchain baked in (TASK_NORMALIZE_IMAGE). The Job
    # has no network, so everything must already be in the image.
    image: ""
    # Shell-style command for TASK_NORMALIZE_COMMAND (parsed with shlex). Curate
    # it to exclude network/git-history-only checkers such as add_dates, e.g.
    #   bash -lc 'make style && python utils/checkers.py <checkers> --fix --keep-going'
    command: ""
    timeout: 1800
    memory: ""          # optional Job memory limit (e.g. 4Gi)
    maxRetries: 2
    guidance: ""        # optional TASK_NORMALIZE_GUIDANCE
    reviewRulesPath: "" # optional REVIEW_RULES_PATH (e.g. .ai/AGENTS.md)
    namespace: ""       # Job namespace; "" = the release namespace
    # ServiceAccount for the Job *pods* (not serge). "" uses the namespace
    # default; the pod gets no API token regardless (automountServiceAccountToken
    # is false), so it needs no permissions.
    podServiceAccount: ""
    # nodeSelector for the Job pods, as "key=value,key2=value2". On CASTAI
    # clusters, target a node template, e.g.
    # "scheduling.cast.ai/node-template=default-by-castai".
    nodeSelector: ""
    # Shared ReadWriteMany volume for task worktrees: serge writes the
    # self-contained clone here and the Job mounts the same claim (by subPath).
    # REQUIRES a storage class that supports ReadWriteMany (EFS, Filestore, ...).
    # WEB_CLONE_CACHE_DIR is set to mountPath so the cache lives on this volume.
    worktree:
      mountPath: /var/lib/reviewbot-clones
      storageClass: ""
      size: 20Gi

# Per-task-pod execution (TASK_EXECUTION=kubernetes) — SERGE_PERTASK_POD_PLAN.md.
# Each /tasks request runs in its own one-shot runner Job that does the whole
# LLM loop + in-process normalize and streams results back to serge over an HTTP
# callback. No shared worktree PVC: the pod clones into its own emptyDir. When
# enabled the chart creates: (1) the task-runner RBAC (serge may manage Jobs +
# per-job Secrets + read its Service), (2) an allowlist-egress NetworkPolicy for
# the task pods (egress only to the serge-egress proxy, serge's callback, and
# kube-dns), and (3) the serge-egress forward proxy (Deployment + Service +
# NetworkPolicy) that CONNECT-allowlists GitHub + the HF LLM only.
# Mutually exclusive with normalize.kubernetes (that spawns nested normalize
# Jobs; here normalize runs in-process in the task pod). Requires
# serviceAccount.create=true. Kubernetes is never mandatory — leave disabled for
# docker/inprocess deployments.
taskExecution:
  kubernetes:
    enabled: false
    # Runner image: reviewbot layered on the repo toolchain
    # (docker/Dockerfile.task-runner). REQUIRED when enabled.
    image: ""
    # Wall-clock cap (seconds) per task Job.
    timeout: 3600
    # Optional per-task pod memory limit (e.g. 4Gi).
    memory: ""
    # Job namespace; "" = the release namespace.
    namespace: ""
    # ServiceAccount for the task *pods* (not serge). "" = namespace default;
    # the pod gets no API token regardless (automountServiceAccountToken=false).
    podServiceAccount: ""
    # nodeSelector for the task pods, as "key=value,key2=value2".
    nodeSelector: ""
    # Base URL the runner POSTs events + the terminal result back to. "" =
    # serge's in-cluster Service DNS (http://<release>.<ns>.svc.cluster.local).
    # The callback bypasses the egress proxy (see NO_PROXY in the ConfigMap).
    callbackBaseUrl: ""
    # serge-egress: the allowlisting forward proxy the task pods must route all
    # egress through. It performs DNS + CONNECT only to the domains below.
    egress:
      # A standard tinyproxy image. REQUIRED when enabled.
      image: ""
      replicas: 1
      port: 3128
      # Host regexes the proxy permits CONNECT to (tinyproxy FilterExtended).
      # Everything else is denied (FilterDefaultDeny).
      allowDomains:
        - '(^|\.)github\.com$'
        - '(^|\.)githubusercontent\.com$'
        - '^router\.huggingface\.co$'
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
    # kube-dns selector so the task pods + proxy may resolve names. Adjust for
    # clusters where CoreDNS runs under a different label/namespace.
    kubeDns:
      namespace: kube-system
      podLabels:
        k8s-app: kube-dns
