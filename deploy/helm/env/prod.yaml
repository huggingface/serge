# Values for the serge deployment on the open-source EKS cluster
# (opensource-aws-use1-prod-54), namespace chosen at install time.
# Deploy: deploy/scripts/deploy.sh -n serge -f deploy/helm/env/prod.yaml
#
# Image is public on GHCR (ghcr.io/huggingface/serge) so no imagePullSecret
# is needed. The ACM cert for serge.huggingface.tech already exists in this
# account (infra 05-eks-utils) and is auto-discovered by the ALB controller
# via the ingress host; external-dns creates the DNS record from the ingress.

image:
  # Bump to a newer sha-<commit> (pushed by CI on merge to main) or use latest.
  tag: sha-27f8140

replicas: 1

# serge creates the per-task Job + per-job Secret and reads the egress proxy's
# ClusterIP, so it needs its own ServiceAccount + Role (rendered by the chart
# when taskExecution.kubernetes is enabled).
serviceAccount:
  create: true

# Sensitive env, consumed via envFrom. The Secret is produced by the Infisical
# operator from the externalSecret block below — no --secret-file, no secret in
# git. The keys under /serge are named exactly as serge's env vars (GITHUB_APP_ID,
# GITHUB_PRIVATE_KEY, GITHUB_WEBHOOK_SECRET, GITHUB_OAUTH_CLIENT_ID,
# GITHUB_OAUTH_CLIENT_SECRET, WEB_SESSION_SECRET, LLM_API_KEY) so envFrom maps
# them 1:1.
existingSecret: serge-secrets

# Infisical → serge-secrets Secret. Mirrors the transformers-ci dashboard wiring;
# requires the Infisical operator (secrets.infisical.com) installed in-cluster.
externalSecret:
  enabled: true
  apiVersion: secrets.infisical.com/v1alpha1
  kind: InfisicalSecret
  name: serge-secrets
  spec:
    hostAPI: https://secrets.huggingface.tech/api
    resyncInterval: 60
    authentication:
      universalAuth:
        credentialsRef:
          secretName: secrets-operator-auth
          secretNamespace: infisical
        secretsScope:
          projectSlug: open-source-btxm
          envSlug: opensource-aws-use1-prod-54
          secretsPath: /serge
    managedSecretReference:
      secretName: serge-secrets
      secretNamespace: serge
      creationPolicy: Owner

persistence:
  enabled: true
  size: 5Gi
  # "" = cluster default StorageClass (EBS gp3 on this cluster).
  storageClass: ""

ingress:
  enabled: true
  host: serge.huggingface.tech
  path: /
  className: "alb"
  annotations:
    # Internal ALB: reachable from the internal network / VPN only, NOT the
    # public internet. (Note: inbound GitHub App webhooks cannot reach an
    # internal ALB — fine for the OAuth web flow, which redirects in the
    # user's browser.)
    alb.ingress.kubernetes.io/scheme: "internal"
    alb.ingress.kubernetes.io/target-type: "ip"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: "/healthz"
    alb.ingress.kubernetes.io/tags: "Env=prod,Project=serge"

# Non-secret runtime config.
envVars:
  PORT: "8080"
  LOG_LEVEL: "INFO"
  LLM_API_BASE: "https://router.huggingface.co/v1"
  LLM_MODEL: "moonshotai/Kimi-K2.6"
  LLM_STREAM: "1"
  LLM_BILL_TO: "huggingface"
  # Kimi can spend a substantial part of the completion budget on reasoning.
  # Keep enough room for long tool-heavy reviews and the final JSON review.
  LLM_MAX_TOKENS: "49152"
  TOOL_MAX_ITERATIONS: "30"
  TASK_LLM_MAX_TOKENS: "49152"
  # Tasks run in STRICT budget mode (every tool call counts, not just blind
  # turns — see reviewer._run_tool_loop), to preserve output budget for the
  # final patch JSON. 30 was too tight for a repo the size of transformers:
  # the agent spent the whole budget exploring and never emitted a patch, so
  # the forced tool-free final turn returned empty/unparseable output. Give
  # large-repo fixes room to converge. Higher = more exploration but larger
  # per-turn context (cost + latency); tune against the target repo.
  TASK_TOOL_MAX_ITERATIONS: "80"
  # Normalize gate for /tasks. In the pod-per-task model the runner runs this
  # command in-process (formerly the separate normalize Job). Unset = gate is
  # skipped entirely, so it MUST be set. Argv is shlex-split; bash -lc runs the
  # repo's own normalizer. Mirrors the retired normalize.kubernetes settings.
  TASK_NORMALIZE_COMMAND: "bash -lc 'make style && python utils/checkers.py ruff_check,ruff_format,init_isort,sort_auto_mappings,types,modeling_structure,auto_mappings,imports,import_complexity,copies,modular_conversion,doc_toc,modeling_rules_doc,docstrings,dummies,repo,inits,pipeline_typing,config_docstrings,config_attributes,doctest_list,update_metadata,deps_table --fix --keep-going'"
  TASK_NORMALIZE_TIMEOUT: "1800"
  TASK_NORMALIZE_MAX_RETRIES: "2"
  REVIEW_RULES_PATH: ".ai/AGENTS.md"
  MENTION_TRIGGER: "@askserge"
  REVIEW_EVENT: "COMMENT"
  TASK_API_ENABLED: "1"
  # Refuse to run PR-author subprocesses unless bubblewrap is available.
  # Requires the node to allow unprivileged user namespaces; if pods fail
  # to run reviews, switch to "auto".
  HELPER_SANDBOX: "require"
  DEV_NO_AUTH: "0"
  WEB_ALLOWED_ORG: "huggingface"
  # Comma-separated GitHub logins allowed to view any user's review
  # (not just their own) via a shared link.
  WEB_ADMIN_USERS: "tarekziade"
  GITHUB_OAUTH_CALLBACK_URL: "https://serge.huggingface.tech/auth/callback"
  WEB_GITHUB_APP_URL: "https://github.com/apps/sergereview"

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Pod-per-task execution (SERGE_PERTASK_POD_PLAN.md). serge launches one runner
# pod per /tasks request; the pod runs the whole agent loop + in-process
# normalize and streams results back over an authenticated callback. All pod
# egress is forced through the serge-egress allowlist proxy (git + HF LLM only).
taskExecution:
  kubernetes:
    enabled: true
    # Also run PR *reviews* in per-review pods (orchestrator-pods Phase 3/4).
    # The UI/webhook review flow spawns a review pod and serge reconstructs the
    # draft on the terminal callback. false = reviews run in-process in serge.
    reviewPods: true
    # transformers toolchain + serge (docker/Dockerfile.task-runner).
    image: ghcr.io/huggingface/serge-task-runner:sha-27f8140
    # Wall-clock cap per task (matches the old in-process worker budget).
    timeout: 3600
    # The in-pod normalizer (make style / checkers over transformers) is
    # memory-hungry; mirror the retired normalize Job's 6Gi.
    memory: "6Gi"
    # Schedule task pods on the same CastAI node template as serge.
    nodeSelector: "scheduling.cast.ai/node-template=default-by-castai"
    egress:
      # Self-built tinyproxy (docker/Dockerfile.egress-proxy).
      image: ghcr.io/huggingface/serge-egress:sha-27f8140
