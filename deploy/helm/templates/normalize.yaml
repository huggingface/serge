{{- if .Values.normalize.kubernetes.enabled }}
{{- $sa := .Values.serviceAccount.name | default (include "name" .) }}
# ---------------------------------------------------------------------------
# Kubernetes normalize backend (TASK_SANDBOX_BACKEND=kubernetes).
# Created only when normalize.kubernetes.enabled. serge creates a one-shot Job
# per patch-validation; these resources grant it the access it needs, give the
# Job a shared RWX worktree volume, and deny the Job pods all network egress.
# ---------------------------------------------------------------------------
{{- if not .Values.serviceAccount.create }}
{{- fail "normalize.kubernetes.enabled requires serviceAccount.create=true (the Job RoleBinding targets serge's ServiceAccount)" }}
{{- end }}
---
# Shared RWX volume for task worktrees. serge writes the self-contained clone
# here (WEB_CLONE_CACHE_DIR); each Job mounts this same claim by subPath.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "name" . }}-worktrees
  namespace: {{ .Release.Namespace }}
  labels: {{ include "labels.standard" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: {{ .Values.normalize.kubernetes.worktree.size | quote }}
  {{- with .Values.normalize.kubernetes.worktree.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
---
# serge manages one-shot normalize Jobs and reads their pods' logs.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "name" . }}-normalize
  namespace: {{ .Release.Namespace }}
  labels: {{ include "labels.standard" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # run_job polls read_namespaced_job_status, which reads the jobs/status
  # subresource — RBAC treats it separately from "jobs", so it needs its own
  # grant or every normalize Job 403s on the first status poll.
  - apiGroups: ["batch"]
    resources: ["jobs/status"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "name" . }}-normalize
  namespace: {{ .Release.Namespace }}
  labels: {{ include "labels.standard" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "name" . }}-normalize
subjects:
  - kind: ServiceAccount
    name: {{ $sa }}
    namespace: {{ .Release.Namespace }}
---
# Deny-all egress for the Job pods — the `--network none` equivalent. Selects
# the sandbox label set by k8s_sandbox.build_job_manifest. No egress rules =
# all egress denied (including DNS), so the normalizer cannot reach the network.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "name" . }}-normalize-deny-egress
  namespace: {{ .Release.Namespace }}
  labels: {{ include "labels.standard" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      serge.io/sandbox: normalize
  policyTypes:
    - Egress
  egress: []
{{- end }}
