apiVersion: v1
kind: ConfigMap
metadata:
  labels: {{ include "labels.standard" . | nindent 4 }}
  name: {{ include "name" . }}
  namespace: {{ .Release.Namespace }}
data:
  {{- range $key, $value := $.Values.envVars }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- if .Values.taskExecution.kubernetes.enabled }}
  {{- $t := .Values.taskExecution.kubernetes }}
  {{- $egress := printf "%s-egress" (include "name" .) }}
  TASK_EXECUTION: "kubernetes"
  TASK_RUNNER_IMAGE: {{ $t.image | quote }}
  TASK_RUNNER_TIMEOUT: {{ $t.timeout | quote }}
  {{- with $t.memory }}
  TASK_RUNNER_MEMORY: {{ . | quote }}
  {{- end }}
  # All task-pod egress goes through the serge-egress proxy; the in-cluster
  # callback to serge bypasses it (NO_PROXY).
  TASK_RUNNER_PROXY: "http://{{ $egress }}.{{ .Release.Namespace }}.svc.cluster.local:{{ $t.egress.port }}"
  TASK_RUNNER_NO_PROXY: ".svc.cluster.local,.svc,.cluster.local,localhost,127.0.0.1"
  # serge keeps this proxy's allowlist in sync with the configured LLM
  # provider hosts (built-in + dynamic per-repo provider_configs).
  TASK_EGRESS_NAME: {{ $egress | quote }}
  TASK_CALLBACK_BASE_URL: {{ $t.callbackBaseUrl | default (printf "http://%s.%s.svc.cluster.local" (include "name" .) .Release.Namespace) | quote }}
  {{- with $t.namespace }}
  TASK_K8S_NAMESPACE: {{ . | quote }}
  {{- end }}
  {{- with $t.podServiceAccount }}
  TASK_K8S_SERVICE_ACCOUNT: {{ . | quote }}
  {{- end }}
  {{- with $t.nodeSelector }}
  TASK_K8S_NODE_SELECTOR: {{ . | quote }}
  {{- end }}
  {{- if $t.gpuProfiles }}
  # issue #20 — per-task GPU placement profiles (flavor -> placement), consumed
  # by serge at launch to schedule GPU task pods (config._parse_gpu_profiles).
  TASK_K8S_GPU_PROFILES: {{ $t.gpuProfiles | toJson | quote }}
  {{- end }}
  {{- with $t.testCommand }}
  # issue #20 — the hard test gate: argv the task's node-IDs are appended to.
  TASK_TEST_COMMAND: {{ . | quote }}
  TASK_TEST_TIMEOUT: {{ $t.testTimeout | quote }}
  TASK_TEST_MAX_RETRIES: {{ $t.testMaxRetries | quote }}
  {{- end }}
  {{- if $t.reviewPods }}
  # Run PR reviews in per-review pods too, reusing this backend's infra.
  REVIEW_EXECUTION: "kubernetes"
  {{- with $t.reviewImage }}
  REVIEW_RUNNER_IMAGE: {{ . | quote }}
  {{- end }}
  {{- end }}
  {{- end }}
