{{- if .Values.externalSecret.enabled }}
#------------------------------------------------------------------------------
# External secret-management resource
#
# Provider-neutral: supply apiVersion, kind, and spec from your deployment values
# for the secret-management operator used in your environment (e.g. Infisical's
# InfisicalSecret). It produces the Secret referenced by `existingSecret`, which
# the Deployment consumes via envFrom.
#------------------------------------------------------------------------------
apiVersion: {{ required "externalSecret.apiVersion is required when externalSecret.enabled=true" .Values.externalSecret.apiVersion }}
kind: {{ required "externalSecret.kind is required when externalSecret.enabled=true" .Values.externalSecret.kind }}
metadata:
  name: {{ .Values.externalSecret.name | default "serge-secrets" }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "labels.standard" . | nindent 4 }}
spec:
{{- tpl (toYaml .Values.externalSecret.spec) . | nindent 2 }}
{{- end }}
